data:
  raw_path: "data/raw"
  processed_path: "data/processed"
  models_path: "data/models"
  dataset_name: "gesture_data.npz"

gestures:
  actions:
    - "turn_left"
    - "turn_right"
    - "go_back"
    - "go_forward"
    - "look_around"
    - "stop"
    - "make_photo"
    - "no_gesture"

  display_names:
    turn_left: "turn_left"
    turn_right: "turn_right"
    go_back: "go_back"
    go_forward: "go_forward"
    look_around: "look_around"
    stop: " stop"
    make_photo: "make_photo"
    no_gesture: "no_gesture"

collection:
  num_sequences: 80
  sequence_length: 45
  start_folder: 0
  countdown_frames: 60

mediapipe:
  min_detection_confidence: 0.7
  min_tracking_confidence: 0.5
  max_num_hands: 2
  model_complexity: 1

model:
  input_size: 126
  hidden_size: 128
  num_layers: 3
  dropout: 0.3
  bidirectional: false
  use_attention: false

training:
  batch_size: 32
  epochs: 150
  learning_rate: 0.001
  weight_decay: 0.0001
  validation_split: 0.15
  test_split: 0.10
  early_stopping_patience: 20
  reduce_lr_patience: 7
  reduce_lr_factor: 0.5

inference:
  confidence_threshold: 0.85
  smoothing_window: 5
  min_detection_frames: 20
  max_history: 5

camera:
  width: 1280
  height: 720
  fps: 30
  camera_id: 0

visualization:
  show_landmarks: false
  show_probabilities: true
  show_history: true
  colors:
    turn_left: [245, 117, 16]
    turn_right: [117, 245, 16]
    go_back: [16, 117, 245]
    go_forward: [245, 16, 117]
    look_around: [117, 16, 245]
    stop: [245, 245, 16]
    make_photo: [34,56,105]
    no_gesture: [30, 234, 167]

device: "auto"